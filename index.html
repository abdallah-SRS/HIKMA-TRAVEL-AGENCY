<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikma HQ | Global Logistics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: #050505; color: #00d4ff; overflow: hidden; }

        /* Dashboard Overlay */
        .dashboard {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            pointer-events: none;
            z-index: 10;
        }

        /* Header */
        .header-ui {
            border-left: 4px solid #00d4ff;
            padding-left: 20px;
            pointer-events: auto;
        }
        .header-ui h1 { font-size: 2.5rem; letter-spacing: 5px; }

        /* Bottom Status Bar */
        .status-bar {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .contact-info { font-size: 1.1rem; color: #fff; }

        /* Navigation Panels */
        .side-panel {
            position: absolute;
            right: 30px;
            top: 30%;
            width: 250px;
            pointer-events: auto;
        }
        .nav-item {
            background: rgba(255, 255, 255, 0.05);
            margin: 10px 0;
            padding: 15px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-item:hover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }

        #globe-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

    <div id="globe-container"></div>

    <div class="dashboard">
        <div class="header-ui">
            <h1>HIKMA_SYSTEMS_v1.0</h1>
            <p>STATUS: ACTIVE | LOCATION: ADDIS ABABA</p>
        </div>

        <div class="side-panel">
            <div class="nav-item">/SCHOLARSHIPS_CHINA</div>
            <div class="nav-item">/SCHOLARSHIPS_TURKEY</div>
            <div class="nav-item">/FLIGHT_LOGISTICS</div>
            <div class="nav-item">/CONTACT_SECURE</div>
        </div>

        <div class="status-bar">
            <div class="contact-info">
                AGENCY_LINE: <strong>+251 915 224 639</strong>
            </div>
            <div>HIKMA TRAVEL AGENCY © 2026</div>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('globe-container').appendChild(renderer.domElement);

        // Core 3D Globe (Scanning Effect)
        const geometry = new THREE.IcosahedronGeometry(5, 15);
        const material = new THREE.MeshPhongMaterial({
            color: 0x00d4ff,
            wireframe: true,
            transparent: true,
            opacity: 0.4
        });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Inner solid core
        const coreGeom = new THREE.SphereGeometry(4.8, 32, 32);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x001122 });
        const core = new THREE.Mesh(coreGeom, coreMat);
        scene.add(core);

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x222222));

        camera.position.z = 12;

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.003;
            globe.rotation.x += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
